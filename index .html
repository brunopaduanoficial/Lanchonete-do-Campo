<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Lanchonete</title>

<!-- SCRIPTS DO FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#f5f0e6;
  color:#000;
}

.login-screen{
  position:fixed;
  inset:0;
  background:#e9dfcf;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.login-box{
  background:#fff;
  width:90%;
  max-width:350px;
  padding:30px;
  border-radius:20px;
}

.login-box h1{
  text-align:center;
  margin-bottom:20px;
}

.login-box input{
  width:100%;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
  border:1px solid #ccc;
}

.topbar{
  background:#fff;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.menu-btn{
  font-size:30px;
  cursor:pointer;
}

.admin-menu{
  position:fixed;
  top:0;
  right:-320px;
  width:320px;
  height:100%;
  background:#fff;
  padding:20px;
  transition:0.3s;
  z-index:999;
  overflow:auto;
}

.admin-menu.active{
  right:0;
}

.menu-item{
  background:#f1f5f9;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
  cursor:pointer;
  font-weight:bold;
}

.main{
  padding:15px;
}

.btn{
  background:#2563eb;
  color:#fff;
  border:none;
  padding:12px;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.btn-full{
  width:100%;
  margin-bottom:20px;
}

.btn-avulso {
  background: #0284c7;
  color: #fff;
  font-size: 16px;
  margin-bottom: 15px;
}

.input-pesquisa{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #ccc;
  margin-bottom:20px;
}

.mesas{
  display:flex;
  flex-direction:column;
  gap:15px;
}

.mesa-card{
  background:#fff;
  padding:20px;
  border-radius:18px;
}

.item-produto{
  background:#f1f5f9;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}

.produto-card{
  background:#f8fafc;
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
}

.produto-acoes{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:10px;
}

.categoria-title{
  background:#000;
  color:#fff;
  padding:12px;
  border-radius:12px;
  margin:20px 0 15px;
  font-weight: bold;
  text-transform: uppercase;
  font-size: 13px;
}

.controle-qtd{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:5px;
}

.botoes-qtd{
  display:flex;
  gap:5px;
}

.qtd-numero{
  font-size:18px;
  font-weight:bold;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.modal-content{
  background:#fff;
  width:90%;
  max-width:450px;
  max-height:90vh;
  overflow:auto;
  padding:20px;
  border-radius:20px;
}

.relatorio-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 15px;
}

.relatorio-table th, .relatorio-table td {
  padding: 12px;
  text-align: left;
  border-bottom: 1px solid #e2e8f0;
}

.relatorio-table th {
  background: #f1f5f9;
  font-weight: bold;
}

.total-destaque {
  font-size: 18px;
  background: #e2e8f0;
  font-weight: bold;
}

.filtro-data-container {
  background: #f8fafc;
  padding: 15px;
  border-radius: 12px;
  border: 1px solid #e2e8f0;
  margin-bottom: 15px;
  display: flex;
  gap: 10px;
  align-items: center;
}

.filtro-data-container input[type="date"] {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #cbd5e1;
  font-size: 16px;
}
</style>
</head>

<body>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h1>Login</h1>
    <input type="text" id="usuario" placeholder="Usuário">
    <input type="password" id="senha" placeholder="Senha">
    <button class="btn btn-full" onclick="fazerLogin()">Entrar</button>
  </div>
</div>

<div class="topbar">
  <h2 id="tituloTop">Mesas</h2>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
</div>

<div class="admin-menu" id="adminMenu">
  <div class="menu-item id-admin" onclick="adicionarGarcom()">Adicionar Garçom</div>
  <div class="menu-item id-admin" onclick="abrirListaGarcons()">Garçons Cadastrados</div>
  <div class="menu-item id-admin" onclick="adicionarProdutoAdmin()">Adicionar Produto</div>
  <div class="menu-item id-admin" onclick="abrirListaProdutos()">Produtos Cadastrados</div>
  <div class="menu-item id-admin" style="background: #1e293b; color: white;" onclick="abrirRelatorios()">📈 Relatórios de Vendas</div>
  <div class="menu-item" style="background: #dc2626; color: white;" onclick="fazerLogout()">Sair / Trocar Usuário</div>
  <div class="menu-item" onclick="fecharMenu()">Fechar Menu</div>
</div>

<div class="main">
  <button class="btn btn-full" onclick="abrirMesa()">+ Abrir Mesa</button>
  <input type="text" id="pesquisaMesa" class="input-pesquisa" placeholder="Pesquisar mesa ou cliente..." onkeyup="renderizarMesas()"/>
  <div class="mesas" id="listaMesas"></div>
</div>

<div class="modal" id="modalGerenciamento">
  <div class="modal-content">
    <h2 id="modalGerenciamentoTitulo">Selecionar</h2>
    <div id="containerBotaoAvulso"></div>
    <input type="text" id="pesquisaModal" class="input-pesquisa" placeholder="Pesquisar produto ou categoria..." onkeyup="filtrarItensModal()"/>
    <div id="modalGerenciamentoConteudo"></div>
    <br>
    <button class="btn btn-full" onclick="fecharModalGerenciamento()">Voltar</button>
  </div>
</div>

<script>
// --- CONFIGURAÇÃO DO SEU FIREBASE ---
const firebaseConfig = {
  apiKey: "AIzaSyBmyN-rD4JDgwcZeP_pKvS",
  authDomain: "lanchonetedocampo.firebaseapp.com",
  databaseURL: "https://lanchonetedocampo-default-rtdb.firebaseio.com/",
  projectId: "lanchonetedocampo",
  storageBucket: "lanchonetedocampo.appspot.com",
  messagingSenderId: "594623312303"
};

// Inicializa o Firebase
firebase.initializeApp(firebaseConfig);
const database = firebase.database();

// --- ESTADO LOCAL SINCRONIZADO ---
let garcons = [];
let produtos = [];
let mesas = [];
let historicoVendas = [];

let mesaSelecionada = null;
let quantidadeTemp = {};
let mesasAbertas = {};
let usuarioLogado = null;
let contextoModalAtivo = '';

// --- CONTROLE DO BOTÃO VOLTAR DO CELULAR (NATIVO) ---
function gerenciarEstadoHistorico() {
  // Cria um estado falso no histórico sempre que um modal abrir
  history.pushState({ modalAberto: true }, "");
}

window.addEventListener("popstate", function (event) {
  // Se o usuário usou o voltar do celular e tinha modal ou menu ativo, fecha eles em vez de fechar o site
  let modalAberto = document.getElementById('modalGerenciamento').style.display === 'flex';
  let menuAberto = document.getElementById('adminMenu').classList.contains('active');
  let mesaDetalheAberta = Object.values(mesasAbertas).includes(true);
  let modalPagamento = document.getElementById('modalPagamentoContainer');

  if (modalPagamento) {
    modalPagamento.remove();
    gerenciarEstadoHistorico(); // Mantém o estado controlado
  } else if (modalAberto) {
    fecharModalGerenciamento();
  } else if (menuAberto) {
    fecharMenu();
  } else if (mesaDetalheAberta) {
    fecharVisualMesa();
  }
});

// --- ESCUTAR ALTERAÇÕES DO FIREBASE EM TEMPO REAL ---
database.ref('garcons').on('value', snapshot => {
  const data = snapshot.val();
  garcons = data ? Object.values(data) : [{ usuario:'bruno', senha:'200985' }];
  if (!garcons.find(g => g.usuario.toLowerCase() === 'bruno')) {
    garcons.unshift({ usuario:'bruno', senha:'200985' });
  }
});

database.ref('produtos').on('value', snapshot => {
  const data = snapshot.val();
  produtos = data ? Object.values(data) : [];
  if(contextoModalAtivo === 'produtos') abrirListaProdutos();
  if(contextoModalAtivo === 'pedido') renderizarProdutosMesa(document.getElementById('pesquisaModal').value.toLowerCase());
});

database.ref('mesas').on('value', snapshot => {
  const data = snapshot.val();
  mesas = data ? Object.values(data) : [];
  renderizarMesas();
});

database.ref('vendas').on('value', snapshot => {
  const data = snapshot.val();
  historicoVendas = data ? Object.values(data) : [];
  if(contextoModalAtivo === 'relatorios') abrirRelatorios(document.getElementById('inputDataFiltro')?.value);
});

function sincronizar(caminho, dados) {
  database.ref(caminho).set(dados);
}

// --- AUTENTICAÇÃO ---
function fazerLogin(){
  let usuario = document.getElementById('usuario').value.trim();
  let senha = document.getElementById('senha').value;
  let login = garcons.find(g => g.usuario.toLowerCase() === usuario.toLowerCase() && g.senha === senha);
  if(login){
    usuarioLogado = login.usuario;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('tituloTop').innerText = `Mesas (${usuarioLogado})`;
    configurarMenuAcesso();
  }else{ alert('Login inválido'); }
}

function configurarMenuAcesso() {
  let itensAdmin = document.querySelectorAll('.id-admin');
  let display = usuarioLogado.toLowerCase() === 'bruno' ? 'block' : 'none';
  itensAdmin.forEach(el => el.style.display = display);
}

function fazerLogout() {
  if(confirm("Deseja sair?")) {
    usuarioLogado = null;
    fecharMenu();
    document.getElementById('loginScreen').style.display = 'flex';
  }
}

function toggleMenu(){ 
  let menu = document.getElementById('adminMenu');
  menu.classList.toggle('active');
  if(menu.classList.contains('active')) {
    gerenciarEstadoHistorico();
  }
}
function fecharMenu(){ document.getElementById('adminMenu').classList.remove('active'); }

function fecharModalGerenciamento(){
  document.getElementById('modalGerenciamento').style.display = 'none';
  document.getElementById('containerBotaoAvulso').innerHTML = '';
  document.getElementById('pesquisaModal').value = '';
  document.getElementById('pesquisaModal').style.display = 'block';
  contextoModalAtivo = '';
}

function filtrarItensModal(){
  let pesquisa = document.getElementById('pesquisaModal').value.toLowerCase();
  if (contextoModalAtivo === 'pedido') {
    renderizarProdutosMesa(pesquisa);
  } else if (contextoModalAtivo === 'produtos') {
    abrirListaProdutos(pesquisa);
  } else if (contextoModalAtivo === 'garcons') {
    let cards = document.querySelectorAll('#modalGerenciamentoConteudo .produto-card');
    cards.forEach(card => {
      card.style.display = card.innerText.toLowerCase().includes(pesquisa) ? 'block' : 'none';
    });
  }
}

// --- GERENCIAMENTO DE GARÇONS ---
function adicionarGarcom(){
  if(usuarioLogado.toLowerCase() !== 'bruno') return;
  let usuario = prompt('Nome do Usuário:');
  let senha = prompt('Senha:');
  if(usuario && senha) {
    garcons.push({ usuario: usuario.trim(), senha });
    sincronizar('garcons', garcons);
    alert('Garçom cadastrado!');
    if(contextoModalAtivo === 'garcons') abrirListaGarcons();
  }
}

function abrirListaGarcons(){
  contextoModalAtivo = 'garcons';
  gerenciarEstadoHistorico();
  document.getElementById('modalGerenciamentoTitulo').innerText = 'Garçons';
  let conteudo = document.getElementById('modalGerenciamentoConteudo');
  conteudo.innerHTML = '';
  garcons.forEach((g, i) => {
    conteudo.innerHTML += `
      <div class="produto-card">
        <h3>${g.usuario}</h3>
        ${g.usuario.toLowerCase() !== 'bruno' ? `<button class="btn" style="background:#dc2626;" onclick="removerGarcom(${i})">Remover</button>` : ''}
      </div>`;
  });
  document.getElementById('modalGerenciamento').style.display = 'flex';
}

function removerGarcom(i){
  if(confirm("Remover este garçom?")) { 
    garcons.splice(i,1); 
    sincronizar('garcons', garcons); 
    abrirListaGarcons(); 
  }
}

// --- GERENCIAMENTO DE PRODUTOS ---
function adicionarProdutoAdmin(){
  if(usuarioLogado.toLowerCase() !== 'bruno') return;
  let nome = prompt('Nome do produto:');
  let categoria = prompt('Categoria:');
  let valorInput = prompt('Valor (R$):');
  let valor = parseFloat(valorInput ? valorInput.replace(',', '.') : 0);

  if(nome && categoria && !isNaN(valor)) {
    produtos.push({ nome: nome.trim(), categoria: categoria.trim(), valor });
    sincronizar('produtos', produtos);
    alert('Produto salvo!');
    if(contextoModalAtivo === 'produtos') abrirListaProdutos();
  }
}

function abrirListaProdutos(filtro = ''){
  if(usuarioLogado.toLowerCase() !== 'bruno') return;
  contextoModalAtivo = 'produtos';
  gerenciarEstadoHistorico();
  document.getElementById('modalGerenciamentoTitulo').innerText = 'Gerenciar Cardápio';
  let conteudo = document.getElementById('modalGerenciamentoConteudo');
  conteudo.innerHTML = '';

  let categories = [...new Set(produtos.map(p => p.categoria))];
  categories.forEach(cat => {
    let itensFiltrados = produtos.filter(p => 
      p.categoria === cat && (p.nome.toLowerCase().includes(filtro) || p.categoria.toLowerCase().includes(filtro))
    );
    if (itensFiltrados.length > 0) {
      conteudo.innerHTML += `<div class="categoria-title">${cat}</div>`;
      itensFiltrados.forEach(prod => {
        let idx = produtos.indexOf(prod);
        conteudo.innerHTML += `
          <div class="produto-card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
              <div><h3>${prod.nome}</h3><p>R$ ${prod.valor.toFixed(2)}</p></div>
              <div style="display:flex; gap:5px;">
                <button class="btn" style="background:#f59e0b;" onclick="editarProduto(${idx})">✏️</button>
                <button class="btn" style="background:#dc2626;" onclick="removerProduto(${idx})">🗑️</button>
              </div>
            </div>
          </div>`;
      });
    }
  });
  document.getElementById('modalGerenciamento').style.display = 'flex';
}

function editarProduto(index){
  let p = produtos[index];
  let nome = prompt('Novo Nome:', p.nome);
  let categoria = prompt('Nova Categoria:', p.categoria);
  let valorInput = prompt('Novo Valor:', p.valor);
  let valor = parseFloat(valorInput ? String(valorInput).replace(',', '.') : 0);
  if(nome && categoria && !isNaN(valor)) {
    produtos[index] = { nome: nome.trim(), categoria: categoria.trim(), valor };
    sincronizar('produtos', produtos);
    abrirListaProdutos();
  }
}

function removerProduto(index){
  if(confirm("Deseja remover este produto?")) { 
    produtos.splice(index,1); 
    sincronizar('produtos', produtos); 
    abrirListaProdutos(); 
  }
}

// --- RELATÓRIOS ---
function abrirRelatorios(dataAlvo = null) {
  if(usuarioLogado.toLowerCase() !== 'bruno') return;
  contextoModalAtivo = 'relatorios';
  gerenciarEstadoHistorico();
  fecharMenu();
  if (!dataAlvo) dataAlvo = new Date().toISOString().split('T')[0];

  let totais = { 'Dinheiro':0, 'PIX':0, 'Cartão Crédito':0, 'Cartão Débito':0 };
  historicoVendas.forEach(v => { if(v.data === dataAlvo) totais[v.tipo] = (totais[v.tipo] || 0) + v.valor; });

  let totalGeral = Object.values(totais).reduce((a, b) => a + b, 0);
  let conteudo = document.getElementById('modalGerenciamentoConteudo');
  document.getElementById('pesquisaModal').style.display = 'none';

  conteudo.innerHTML = `
    <div class="filtro-data-container">
      <input type="date" id="inputDataFiltro" value="${dataAlvo}">
      <button class="btn" onclick="abrirRelatorios(document.getElementById('inputDataFiltro').value)">Filtrar</button>
    </div>
    <table class="relatorio-table">
      <tr><td>💵 Dinheiro</td><td>R$ ${totais['Dinheiro'].toFixed(2)}</td></tr>
      <tr><td>📲 PIX</td><td>R$ ${totais['PIX'].toFixed(2)}</td></tr>
      <tr><td>💳 Crédito</td><td>R$ ${totais['Cartão Crédito'].toFixed(2)}</td></tr>
      <tr><td>💳 Débito</td><td>R$ ${totais['Cartão Débito'].toFixed(2)}</td></tr>
      <tr class="total-destaque"><td>TOTAL</td><td>R$ ${totalGeral.toFixed(2)}</td></tr>
    </table><br>
    <button class="btn btn-full" style="background:#dc2626;" onclick="if(confirm('Zerar tudo?')){historicoVendas=[];sincronizar('vendas', historicoVendas);abrirRelatorios();}">Zerar Histórico</button>`;
  document.getElementById('modalGerenciamento').style.display = 'flex';
}

// --- OPERAÇÃO DE MESAS ---
function abrirMesa(){
  let cliente = prompt('Nome do cliente:');
  if(cliente) {
    mesas.push({ mesa: 'Mesa ' + (mesas.length + 1), cliente, total:0, itens:[] });
    sincronizar('mesas', mesas);
  }
}

function toggleMesa(index){ 
  mesasAbertas = {}; 
  mesasAbertas[index] = true; 
  gerenciarEstadoHistorico(); // Permite voltar com o botão físico ao fechar visualização
  renderizarMesas(); 
}
function fecharVisualMesa(){ mesasAbertas = {}; renderizarMesas(); }

function adicionarProduto(index){
  mesaSelecionada = index;
  contextoModalAtivo = 'pedido';
  gerenciarEstadoHistorico();
  document.getElementById('modalGerenciamentoTitulo').innerText = 'Adicionar Item';
  
  document.getElementById('containerBotaoAvulso').innerHTML = `
    <button class="btn btn-full btn-avulso" onclick="adicionarItemAvulsoMesa()">➕ Adicionar Item Avulso</button>
  `;
  
  renderizarProdutosMesa();
}

function adicionarItemAvulsoMesa() {
  let nomeAvulso = prompt("Nome do produto avulso (ex: Acréscimo de Bacon):");
  if(!nomeAvulso) return;
  
  let valorInput = prompt("Valor do item avulso (R$):");
  if(!valorInput) return;
  
  let valorAvulso = parseFloat(valorInput.replace(',', '.'));
  if(isNaN(valorAvulso) || valorAvulso <= 0) {
    alert("Valor inválido!");
    return;
  }
  
  let mesa = mesas[mesaSelecionada];
  if(!mesa.itens) mesa.itens = [];
  
  mesa.itens.push({
    nome: `[AVULSO] ${nomeAvulso.trim()}`,
    valor: valorAvulso,
    whitespace: false,
    quantidade: 1,
    subtotal: valorAvulso
  });
  
  mesa.total += valorAvulso;
  
  sincronizar('mesas', mesas);
  fecharModalGerenciamento();
  alert("Item avulso adicionado com sucesso!");
}

function renderizarProdutosMesa(filtro = ''){
  let conteudo = document.getElementById('modalGerenciamentoConteudo');
  conteudo.innerHTML = '';
  let categories = [...new Set(produtos.map(p => p.categoria))];
  categories.forEach(cat => {
    let itensFiltrados = produtos.filter(p => 
      p.categoria === cat && (p.nome.toLowerCase().includes(filtro) || p.categoria.toLowerCase().includes(filtro))
    );
    if (itensFiltrados.length > 0) {
      conteudo.innerHTML += `<div class="categoria-title">${cat}</div>`;
      itensFiltrados.forEach(prod => {
        let pIdx = produtos.indexOf(prod);
        if(!quantidadeTemp[pIdx]) quantidadeTemp[pIdx] = 1;
        conteudo.innerHTML += `
          <div class="produto-card">
            <h3>${prod.nome}</h3><p>R$ ${prod.valor.toFixed(2)}</p>
            <div class="produto-acoes">
              <div class="controle-qtd">
                <div class="qtd-numero" id="qtd-${pIdx}">${quantidadeTemp[pIdx]}</div>
                <div class="botoes-qtd">
                  <button class="btn" onclick="if(quantidadeTemp[${pIdx}]>1) {quantidadeTemp[${pIdx}]--; document.getElementById('qtd-${pIdx}').innerText=quantidadeTemp[${pIdx}]}">-</button>
                  <button class="btn" onclick="whitespace=false; quantidadeTemp[${pIdx}]++; document.getElementById('qtd-${pIdx}').innerText=quantidadeTemp[${pIdx}]">+</button>
                </div>
              </div>
              <button class="btn" onclick="selecionarProduto(${pIdx})">Selecionar</button>
            </div>
          </div>`;
      });
    }
  });
  document.getElementById('modalGerenciamento').style.display = 'flex';
}

function selecionarProduto(pIdx){
  let p = produtos[pIdx];
  let qtd = quantidadeTemp[pIdx] || 1;
  let mesa = mesas[mesaSelecionada];
  if(!mesa.itens) mesa.itens = [];
  
  let item = mesa.itens.find(i => i.nome === p.nome);
  if(item) { 
    item.quantidade += qtd; 
    item.subtotal = item.quantidade * item.valor; 
  } else { 
    mesa.itens.push({ nome: p.nome, valor: p.valor, quantidade: qtd, subtotal: p.valor * qtd }); 
  }
  mesa.total += p.valor * qtd;
  quantidadeTemp[pIdx] = 1; 
  
  sincronizar('mesas', mesas);
  fecharModalGerenciamento();
}

function fecharMesa(index){
  let mesa = mesas[index];
  let modal = document.createElement('div');
  modal.id = "modalPagamentoContainer";
  gerenciarEstadoHistorico();
  modal.innerHTML = `
  <div style="position:fixed; inset:0; background:rgba(0,0,0,0.5); display:flex; justify-content:center; align-items:center; z-index:9999;">
    <div style="background:#fff; width:90%; max-width:400px; padding:20px; border-radius:20px;">
      <h2>Fechar Conta - R$ ${mesa.total.toFixed(2)}</h2><br>
      <button class="btn btn-full" onclick="receberPagamento('PIX',${index})">PIX</button>
      <button class="btn btn-full" onclick="receberPagamento('Dinheiro',${index})">Dinheiro</button>
      <button class="btn btn-full" onclick="receberPagamento('Cartão Crédito',${index})">Crédito</button>
      <button class="btn btn-full" onclick="receberPagamento('Cartão Débito',${index})">Débito</button>
      <button class="btn btn-full" style="background:#dc2626;" onclick="document.getElementById('modalPagamentoContainer').remove()">Cancelar</button>
    </div>
  </div>`;
  document.body.appendChild(modal);
}

function receberPagamento(tipo, index){
  let mesa = mesas[index];
  let totalMesa = mesa.total;
  let resumenFinal = `Venda registrada!\nForma: ${tipo}\nTotal: R$ ${totalMesa.toFixed(2)}`;
  if(tipo === 'Dinheiro') {
    let pagoInput = prompt(`Total: R$ ${totalMesa.toFixed(2)}\nValor pago pelo cliente:`);
    if(pagoInput === null) return;
    let pago = parseFloat(pagoInput.replace(',', '.'));
    if(isNaN(pago) || pago < totalMesa) { alert("Valor insuficiente!"); return; }
    resumenFinal += `\nRecebido: R$ ${pago.toFixed(2)}\nTroco: R$ ${(pago - totalMesa).toFixed(2)}`;
  }
  
  historicoVendas.push({ valor: totalMesa, tipo, data: new Date().toISOString().split('T')[0] });
  mesas.splice(index, 1);
  mesasAbertas = {};
  
  sincronizar('vendas', historicoVendas);
  sincronizar('mesas', mesas);
  
  alert(resumenFinal);
  document.getElementById('modalPagamentoContainer').remove();
}

function alterarQuantidadeItem(mesaIdx, itemIdx, delta) {
  let mesa = mesas[mesaIdx];
  let item = mesa.itens[itemIdx];
  item.whitespace = false;
  item.whitespace = false;
  item.quantidade += delta;
  item.subtotal = item.quantidade * item.valor;
  mesa.total += (delta * item.valor);
  if(item.quantidade <= 0) { mesa.itens.splice(itemIdx, 1); }
  sincronizar('mesas', mesas);
}

function renderizarMesas(){
  let lista = document.getElementById('listaMesas');
  if(!lista) return;
  let pesquisa = document.getElementById('pesquisaMesa').value.toLowerCase();
  lista.innerHTML = '';
  
  mesas.forEach((m, i) => {
    if(!m.mesa.toLowerCase().includes(pesquisa) && !m.cliente.toLowerCase().includes(pesquisa)) return;
    if(Object.values(mesasAbertas).includes(true) && !mesasAbertas[i]) return;
    
    let itensHtml = '';
    if (mesasAbertas[i] && m.itens) {
      itensHtml = m.itens.map((it, idx) => `
        <div class="item-produto">
          <strong>${it.nome}</strong><br>
          ${it.whitespace || it.quantidade}x R$ ${it.valor.toFixed(2)} = R$ ${it.subtotal.toFixed(2)}
          <div class="produto-acoes">
            <button class="btn" onclick="alterarQuantidadeItem(${i}, ${idx}, -1)">-</button>
            <button class="btn" onclick="alterarQuantidadeItem(${i}, ${idx}, 1)">+</button>
          </div>
        </div>`).join('');
    }

    lista.innerHTML += `
      <div class="mesa-card">
        <h3>${m.mesa} - ${m.cliente}</h3>
        <strong>Total: R$ ${m.total.toFixed(2)}</strong><br><br>
        <div class="produto-acoes">
          ${mesasAbertas[i] 
            ? `<button class="btn" onclick="adicionarProduto(${i})">+ Item</button>
               <button class="btn" style="background:#16a34a;" onclick="fecharMesa(${i})">Fechar Mesa</button>
               <button class="btn" style="background:#dc2626;" onclick="fecharVisualMesa()">Voltar</button>`
            : `<button class="btn" onclick="toggleMesa(${i})">Abrir Detalhes</button>`
          }
        </div>
        ${itensHtml}
      </div>`;
  });
}
</script>
